<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Default fallback meta (overridden per-route by react-helmet-async) ── -->
    <meta name="theme-color"        content="#080808" />
    <meta name="color-scheme"       content="dark" />
    <meta name="author"             content="Saksham Srivastava" />
    <meta name="description"        content="Full-stack developer and builder focused on AI-driven systems, scalable web platforms, and high-performance digital products. Based in New Delhi, India." />
    <meta name="keywords"           content="Saksham Srivastava, Full Stack Developer, React Developer, AI Developer, New Delhi, Portfolio" />
    <meta name="robots"             content="index, follow" />

    <!-- ── Default Open Graph fallbacks ─────────────────────────────── -->
    <meta property="og:site_name"   content="Saksham Srivastava" />
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://sakshams.me" />
    <meta property="og:title"       content="Saksham Srivastava — Full-Stack Developer" />
    <meta property="og:description" content="Full-stack developer and builder focused on AI-driven systems, scalable web platforms, and high-performance digital products." />
    <meta property="og:image"       content="https://sakshams.me/og/og-default.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="en_US" />

    <!-- ── Default Twitter Card fallbacks ─────────────────────────── -->
    <meta name="twitter:card"       content="summary_large_image" />
    <meta name="twitter:title"      content="Saksham Srivastava — Full-Stack Developer" />
    <meta name="twitter:description" content="Full-stack developer and builder focused on AI-driven systems, scalable web platforms, and high-performance digital products." />
    <meta name="twitter:image"      content="https://sakshams.me/og/og-default.png" />

    <!-- ── Page title ──────────────────────────────────────────────── -->
    <title>Saksham Srivastava — Full-Stack Developer</title>

    <!-- ── Favicons ─────────────────────────────────────────────────────────── -->
    <!-- JS in main.jsx handles theme-switching for all browsers.               -->
    <!-- This is the fallback for crawlers / no-JS / before JS executes.        -->
    <link rel="icon" type="image/png" href="/main_favicon_transparent.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Sakshams" />
    <link rel="manifest" href="/site.webmanifest" />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
